<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BrrApp</title>
    <link rel="icon" type="image/png" href="LogoClassique.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <img id="logo" src="TextBrrApp.png">

    <p id="description">
        BrrApp est une application de musique local ou on peut ajouter nos artistes préférés ainsi que leurs projets ou singles.
    </p>

    <div class="download-panel">

        <div class="download-text">
            Télécharger la dernière version de BrrApp
            <span id="version">(chargement...)</span>
        </div>

        <a href="https://www.mediafire.com/file/sm8s3jk5ykwyh5k/BrrApp.zip/file" target="_blank">
            DOWNLOAD
        </a>

    </div>

<script>
fetch("api.json")
.then(response => response.json())
.then(api => {

    console.log(api);

    document.getElementById("version").textContent =
        "(" + api.version + ")";

    document.getElementById("download").href =
        api.download;

    console.log(document.getElementById("download").href);

})
.catch(err => console.error(err));
</script>

</body>
</html>
